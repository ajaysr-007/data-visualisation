<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chart Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>AI Chart Assistant</h1>
            <p>Paste your data and ask for any visualization.</p>
        </header>

        <div class="chat-history" id="chatHistory">
            <!-- Messages will be appended here -->
            <div class="message bot">
                <div class="bubble">
                    Hello! I'm your AI data visualization assistant. Please provide some data and ask me to create a chart!
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div id="error" class="error-message hidden"></div>
            <div class="input-wrapper">
                <textarea id="chatInput" placeholder="Message the assistant... (e.g. Here is my data: [{'x':1}], create a bar chart)" rows="1"></textarea>
                <button id="sendBtn" title="Send message">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" xmlns="http://www.w3.org/2000/svg"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
